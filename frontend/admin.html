
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — ResumeAI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --bg2: #13161d; --bg3: #1a1e28;
      --border: #252a38; --accent: #6c63ff; --teal: #22d3a5;
      --warn: #f59e0b; --danger: #f87171; --text: #e8eaf0; --muted: #7a7f92;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    h1,h2,h3 { font-family: 'Syne', sans-serif; }
    input, button { font-family: inherit; }

    /* Nav */
    nav { border-bottom: 1px solid #1e2232; padding: 0 24px; height: 62px; display: flex; align-items: center; justify-content: space-between; background: var(--bg); position: sticky; top: 0; z-index: 50; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon { width: 34px; height: 34px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--text); }

    /* Layout */
    .container { max-width: 960px; margin: 0 auto; padding: 36px 24px; }

    /* Cards */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; }
    .card-title { font-weight: 700; font-size: 15px; margin-bottom: 16px; }

    /* Login */
    #login-section { max-width: 400px; margin: 80px auto; }
    .login-icon { text-align: center; font-size: 40px; margin-bottom: 12px; }
    .login-title { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 24px; }
    .inp { width: 100%; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px; }
    .btn { padding: 10px 20px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-danger { background: #7f1d1d; color: #fca5a5; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .error { color: var(--danger); font-size: 13px; margin-bottom: 10px; }

    /* Dashboard */
    #dash-section { display: none; }
    .dash-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; flex-wrap: wrap; }
    .dash-title { font-size: 22px; flex: 1; }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--muted); font-size: 14px; cursor: pointer; transition: all .2s; font-family: 'DM Sans', sans-serif; }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }

    /* Stat cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
    .stat-icon { font-size: 26px; margin-bottom: 8px; }
    .stat-val { font-size: 26px; font-weight: 800; font-family: 'Syne', sans-serif; }
    .stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* Bar */
    .bar-row { margin-bottom: 10px; }
    .bar-meta { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
    .bar-label { color: var(--muted); }
    .bar-track { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }

    /* Resume list */
    .resume-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
    .resume-info { flex: 1; min-width: 150px; }
    .resume-name { font-weight: 600; font-size: 14px; }
    .resume-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .score-badge { font-size: 13px; font-weight: 700; text-align: center; }
    .score-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
    .empty { text-align: center; padding: 40px; color: var(--muted); }
    .loading { text-align: center; padding: 40px; color: var(--muted); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <div class="logo-icon">📄</div>
    <span class="logo-text">ResumeAI</span>
  </a>
  <span id="nav-badge" style="font-size:13px;color:var(--warn);font-weight:600;display:none;">⚙ Admin Panel</span>
</nav>

<div class="container">

  <!-- Login Section -->
  <div id="login-section">
    <div class="card">
      <div class="login-icon">🔐</div>
      <div class="login-title">Admin Login</div>
      <input type="email" id="email" class="inp" placeholder="admin@resumeai.com" />
      <input type="password" id="password" class="inp" placeholder="Password" onkeydown="if(event.key==='Enter') login()" />
      <div id="login-error" class="error" style="display:none;"></div>
      <button class="btn btn-primary" onclick="login()" id="login-btn">Login</button>
    </div>
  </div>

  <!-- Dashboard Section -->
  <div id="dash-section">
    <div class="dash-header">
      <h2 class="dash-title">Admin Panel</h2>
      <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('stats')" id="tab-stats">📊 Dashboard</button>
      <button class="tab" onclick="switchTab('resumes')" id="tab-resumes">📄 Resumes</button>
    </div>

    <!-- Stats Tab -->
    <div id="stats-tab">
      <div class="stats-grid" id="stat-cards">
        <div class="stat-card"><div class="stat-icon">📄</div><div class="stat-val" id="stat-total">—</div><div class="stat-label">Total Resumes</div></div>
        <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-val" id="stat-score" style="color:var(--teal)">—</div><div class="stat-label">Avg Score</div></div>
        <div class="stat-card"><div class="stat-icon">🤖</div><div class="stat-val" id="stat-ats" style="color:var(--warn)">—</div><div class="stat-label">Avg ATS</div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="card">
          <div class="card-title">Score Distribution</div>
          <div id="dist-bars"></div>
        </div>
        <div class="card">
          <div class="card-title">Last 7 Days</div>
          <div id="day-bars"></div>
        </div>
      </div>
    </div>

    <!-- Resumes Tab -->
    <div id="resumes-tab" style="display:none;">
      <div id="resume-count" style="font-size:13px;color:var(--muted);margin-bottom:16px;"></div>
      <div id="resume-list"></div>
    </div>
  </div>

</div>

<script>
  const API = window.location.hostname === 'localhost' ? 'http://localhost:5000' : 'https://ai-resume-analyzer-backend-xjle.onrender.com'

  function getToken() { return localStorage.getItem('admin_token') }
  function setToken(t) { localStorage.setItem('admin_token', t) }
  function clearToken() { localStorage.removeItem('admin_token') }

  function scoreColor(s) {
    if (!s) return 'var(--muted)'
    if (s >= 75) return 'var(--teal)'
    if (s >= 50) return 'var(--warn)'
    return 'var(--danger)'
  }

  function switchTab(tab) {
    document.getElementById('stats-tab').style.display = tab === 'stats' ? 'block' : 'none'
    document.getElementById('resumes-tab').style.display = tab === 'resumes' ? 'block' : 'none'
    document.getElementById('tab-stats').classList.toggle('active', tab === 'stats')
    document.getElementById('tab-resumes').classList.toggle('active', tab === 'resumes')
  }

  async function login() {
    const email = document.getElementById('email').value
    const password = document.getElementById('password').value
    const errEl = document.getElementById('login-error')
    const btn = document.getElementById('login-btn')

    errEl.style.display = 'none'
    btn.textContent = 'Logging in...'
    btn.disabled = true

    try {
      const res = await fetch(`${API}/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Login failed')
      setToken(data.token)
      showDash()
    } catch (e) {
      errEl.textContent = '⚠ ' + e.message
      errEl.style.display = 'block'
    } finally {
      btn.textContent = 'Login'
      btn.disabled = false
    }
  }

  function logout() {
    clearToken()
    document.getElementById('dash-section').style.display = 'none'
    document.getElementById('login-section').style.display = 'block'
    document.getElementById('nav-badge').style.display = 'none'
  }

  function showDash() {
    document.getElementById('login-section').style.display = 'none'
    document.getElementById('dash-section').style.display = 'block'
    document.getElementById('nav-badge').style.display = 'block'
    loadStats()
    loadResumes()
  }

  async function loadStats() {
    try {
      const res = await fetch(`${API}/admin/stats`, { headers: { Authorization: `Bearer ${getToken()}` } })
      if (res.status === 401) { logout(); return }
      const { stats } = await res.json()

      document.getElementById('stat-total').textContent = stats.totalResumes
      document.getElementById('stat-score').textContent = `${stats.avgScore}/100`
      document.getElementById('stat-ats').textContent = `${stats.avgAts}/100`

      // Distribution bars
      const distEl = document.getElementById('dist-bars')
      const distMax = Math.max(...Object.values(stats.distribution), 1)
      distEl.innerHTML = Object.entries(stats.distribution).map(([bucket, count]) => `
        <div class="bar-row">
          <div class="bar-meta"><span class="bar-label">${bucket}</span><span style="font-weight:600">${count}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${(count/distMax)*100}%"></div></div>
        </div>`).join('')

      // Day bars
      const dayEl = document.getElementById('day-bars')
      const dayEntries = Object.entries(stats.byDay).sort()
      if (dayEntries.length === 0) {
        dayEl.innerHTML = '<div style="color:var(--muted);font-size:13px;">No uploads in last 7 days</div>'
      } else {
        const dayMax = Math.max(...dayEntries.map(([,c]) => c), 1)
        dayEl.innerHTML = dayEntries.map(([day, cnt]) => `
          <div class="bar-row">
            <div class="bar-meta"><span class="bar-label">${day.slice(5)}</span><span style="font-weight:600">${cnt}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${(cnt/dayMax)*100}%;background:var(--teal)"></div></div>
          </div>`).join('')
      }
    } catch (e) { console.error(e) }
  }

  async function loadResumes() {
    const listEl = document.getElementById('resume-list')
    const countEl = document.getElementById('resume-count')
    listEl.innerHTML = '<div class="loading">Loading...</div>'

    try {
      const res = await fetch(`${API}/admin/resumes`, { headers: { Authorization: `Bearer ${getToken()}` } })
      if (res.status === 401) { logout(); return }
      const { resumes, total } = await res.json()

      countEl.textContent = `${total} resumes stored in memory`

      if (resumes.length === 0) {
        listEl.innerHTML = '<div class="empty">No resumes yet</div>'
        return
      }

      listEl.innerHTML = resumes.map(r => `
        <div class="resume-item">
          <div style="font-size:28px">📄</div>
          <div class="resume-info">
            <div class="resume-name">${r.fileName}</div>
            <div class="resume-meta">${new Date(r.uploadedAt).toLocaleString('en-IN')}</div>
          </div>
          <div style="display:flex;gap:16px;align-items:center;">
            <div>
              <div class="score-label">SCORE</div>
              <div class="score-badge" style="color:${scoreColor(r.overallScore)}">${r.overallScore ?? '—'}</div>
            </div>
            <div>
              <div class="score-label">ATS</div>
              <div class="score-badge" style="color:${scoreColor(r.atsCompatibility)}">${r.atsCompatibility ?? '—'}</div>
            </div>
            <button class="btn btn-danger" onclick="deleteResume(${r.id})" style="padding:6px 12px;font-size:12px;">🗑 Delete</button>
          </div>
        </div>`).join('')
    } catch (e) {
      listEl.innerHTML = '<div class="empty">Failed to load</div>'
    }
  }

  async function deleteResume(id) {
    if (!confirm('Delete this resume?')) return
    try {
      await fetch(`${API}/admin/resumes/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${getToken()}` } })
      loadResumes()
      loadStats()
    } catch { alert('Failed to delete') }
  }

  // Auto login if token exists
  window.onload = () => {
    if (getToken()) showDash()
  }
</script>
</body>
</html>
